<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BB AI Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #343541;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    padding: 15px;
    background: #202123;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    max-width: 70%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    line-height: 1.4;
}

.user {
    background: #2563eb;
    align-self: flex-end;
    margin-left: auto;
}

.ai {
    background: #444654;
    align-self: flex-start;
}

.input-bar {
    display: flex;
    padding: 10px;
    background: #202123;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #10a37f;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">🤖 BB AI Chat</div>

<div id="chat" class="chat"></div>

<div class="input-bar">
    <input id="input" placeholder="Send a message..." />
    <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// fake typing effect
function typeMessage(text) {
    const div = document.createElement("div");
    div.className = "message ai";
    chat.appendChild(div);

    let i = 0;
    const interval = setInterval(() => {
        div.innerText += text[i];
        i++;
        chat.scrollTop = chat.scrollHeight;

        if (i >= text.length) clearInterval(interval);
    }, 15);
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // loading bubble
    const loading = document.createElement("div");
    loading.className = "message ai";
    loading.innerText = "Typing...";
    chat.appendChild(loading);

    try {
        const res = await fetch("/ai-reply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });

        const data = await res.json();

        loading.remove();
        typeMessage(data.reply || "No response");

    } catch (err) {
        loading.innerText = "Error connecting to AI";
    }
}

// ENTER key support
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
